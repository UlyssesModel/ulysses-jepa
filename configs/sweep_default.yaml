# Default sweep grid — mirrors the shape of uhura's sweep but on the
# ulysses-jepa axes (n, adapter hidden width, complex extension toggle).
#
# 12 cells × 3 pipelines = 36 cells total. Tune up/down based on eval-set size.

n_values: [16, 32]
hidden_dim_values: [512, 1024, 2048]
use_complex_values: [false]
pipelines:
  - A_tokenized
  - B_compressed_text
  - C_embedding_injection
  # E_predictor_baseline is recognized but off-by-default — opt in by
  # uncommenting (also requires extending eval/sweep.py:_eval_config with
  # a predictor builder; see DECISIONS.md D-012 + ADR-002).
  # - E_predictor_baseline
