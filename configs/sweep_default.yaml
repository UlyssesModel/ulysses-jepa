# Default sweep grid — mirrors the shape of uhura's sweep but on the
# ulysses-jepa axes (n, adapter hidden width, complex extension toggle).
#
# 12 cells × 4 pipelines = 24 cells total (Pipeline E added). Tune up/down
# based on eval-set size.

n_values: [16, 32]
hidden_dim_values: [512, 1024, 2048]
use_complex_values: [false]
pipelines:
  - A_tokenized
  - B_compressed_text
  - C_embedding_injection
  - E_predictor_baseline

# Pipeline E predictor. Default is the research-tier KirkEntropyPredictor
# (no external deps, deterministic random projection). For production
# sweeps, switch class to ParquetKirkPredictor (with `parquet_path` kwarg)
# or TiberiusKirkPredictor (with `endpoint_url` kwarg). See ADR-002.
predictor:
  class: KirkEntropyPredictor
  kwargs: {}
